<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <marker id="dashed-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 16px Arial, sans-serif; fill: #475569; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .groupTitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .config { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .warn { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; rx: 12; }
      .label { font: 700 15px Arial, sans-serif; fill: #14532d; }
      .configLabel { font: 700 15px Arial, sans-serif; fill: #1e3a8a; }
      .warnLabel { font: 700 15px Arial, sans-serif; fill: #713f12; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .configLine { stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 8 6; fill: none; marker-end: url(#dashed-arrow); }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#ffffff" />
  <text x="40" y="50" class="title">Node Serverless Backend Flow</text>
  <text x="40" y="78" class="subtitle">How serverless.yml, API Gateway, Lambda, handler.js, service code, AWS SDK, and DynamoDB work together.</text>

  <rect x="40" y="120" width="395" height="300" class="group" />
  <text x="65" y="152" class="groupTitle">Deployment Configuration</text>
  <rect x="95" y="185" width="285" height="55" class="config" />
  <text x="237" y="209" text-anchor="middle" class="configLabel">npx serverless deploy</text>
  <text x="237" y="229" text-anchor="middle" class="small">run from back-end/</text>
  <rect x="95" y="275" width="285" height="55" class="config" />
  <text x="237" y="299" text-anchor="middle" class="configLabel">serverless.yml</text>
  <text x="237" y="319" text-anchor="middle" class="small">routes, Lambda, IAM, env vars</text>
  <rect x="95" y="365" width="285" height="55" class="config" />
  <text x="237" y="389" text-anchor="middle" class="configLabel">AWS resources created</text>
  <text x="237" y="409" text-anchor="middle" class="small">API Gateway + Lambda + IAM</text>

  <path d="M237 240 L237 275" class="configLine" />
  <path d="M237 330 L237 365" class="configLine" />

  <rect x="500" y="120" width="860" height="300" class="group" />
  <text x="525" y="152" class="groupTitle">Runtime Request Flow</text>
  <rect x="545" y="185" width="170" height="55" class="box" />
  <text x="630" y="209" text-anchor="middle" class="label">Client</text>
  <text x="630" y="229" text-anchor="middle" class="small">Angular / Postman</text>
  <rect x="760" y="185" width="210" height="55" class="box" />
  <text x="865" y="209" text-anchor="middle" class="label">POST /api/v1/register</text>
  <text x="865" y="229" text-anchor="middle" class="small">endpoint path</text>
  <rect x="1015" y="185" width="170" height="55" class="box" />
  <text x="1100" y="209" text-anchor="middle" class="label">API Gateway</text>
  <text x="1100" y="229" text-anchor="middle" class="small">HTTP API</text>
  <rect x="1225" y="185" width="110" height="55" class="box" />
  <text x="1280" y="209" text-anchor="middle" class="label">Lambda</text>
  <text x="1280" y="229" text-anchor="middle" class="small">Node 20</text>

  <rect x="760" y="310" width="230" height="55" class="box" />
  <text x="875" y="334" text-anchor="middle" class="label">handler.register(event)</text>
  <text x="875" y="354" text-anchor="middle" class="small">handler.js</text>
  <rect x="1040" y="310" width="230" height="55" class="box" />
  <text x="1155" y="334" text-anchor="middle" class="label">JSON response</text>
  <text x="1155" y="354" text-anchor="middle" class="small">success or error</text>

  <path d="M715 212 L760 212" class="line" />
  <path d="M970 212 L1015 212" class="line" />
  <path d="M1185 212 L1225 212" class="line" />
  <path d="M1280 240 C1280 285 1005 285 920 310" class="line" />
  <path d="M990 338 L1040 338" class="line" />

  <rect x="40" y="490" width="1320" height="360" class="group" />
  <text x="65" y="522" class="groupTitle">Inside register(event)</text>

  <rect x="90" y="565" width="210" height="55" class="box" />
  <text x="195" y="589" text-anchor="middle" class="label">parseRegisterBody</text>
  <text x="195" y="609" text-anchor="middle" class="small">JSON / base64 / console test</text>
  <rect x="345" y="565" width="230" height="55" class="box" />
  <text x="460" y="589" text-anchor="middle" class="label">validateRegisterPayload</text>
  <text x="460" y="609" text-anchor="middle" class="small">required fields + password</text>
  <rect x="620" y="565" width="240" height="55" class="box" />
  <text x="740" y="589" text-anchor="middle" class="label">createRegisteredUser</text>
  <text x="740" y="609" text-anchor="middle" class="small">services/userService.js</text>
  <rect x="905" y="565" width="190" height="55" class="box" />
  <text x="1000" y="589" text-anchor="middle" class="label">hashPassword</text>
  <text x="1000" y="609" text-anchor="middle" class="small">bcryptjs, 10 rounds</text>
  <rect x="1140" y="565" width="170" height="55" class="box" />
  <text x="1225" y="589" text-anchor="middle" class="label">DynamoDB</text>
  <text x="1225" y="609" text-anchor="middle" class="small">users table</text>

  <path d="M300 592 L345 592" class="line" />
  <path d="M575 592 L620 592" class="line" />
  <path d="M860 592 L905 592" class="line" />
  <path d="M1095 592 L1140 592" class="line" />

  <rect x="90" y="700" width="250" height="55" class="warn" />
  <text x="215" y="724" text-anchor="middle" class="warnLabel">400 Invalid JSON</text>
  <text x="215" y="744" text-anchor="middle" class="small">parse failure</text>
  <rect x="395" y="700" width="250" height="55" class="warn" />
  <text x="520" y="724" text-anchor="middle" class="warnLabel">400 Validation Error</text>
  <text x="520" y="744" text-anchor="middle" class="small">missing field / weak password</text>
  <rect x="965" y="700" width="250" height="55" class="warn" />
  <text x="1090" y="724" text-anchor="middle" class="warnLabel">500 DB Error</text>
  <text x="1090" y="744" text-anchor="middle" class="small">DynamoDB write failed</text>

  <path d="M195 620 L215 700" class="line" />
  <path d="M460 620 L520 700" class="line" />
  <path d="M1225 620 L1090 700" class="line" />

  <rect x="40" y="890" width="1320" height="55" class="config" />
  <text x="700" y="913" text-anchor="middle" class="configLabel">Local testing: npx serverless offline reads serverless.yml and simulates API Gateway + Lambda</text>
  <text x="700" y="933" text-anchor="middle" class="small">The code may still use local AWS credentials to reach the real DynamoDB table.</text>
</svg>
