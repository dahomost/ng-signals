<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="1050" viewBox="0 0 1450 1050">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 16px Arial, sans-serif; fill: #475569; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .groupTitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .config { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .error { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .label { font: 700 15px Arial, sans-serif; fill: #14532d; }
      .configLabel { font: 700 15px Arial, sans-serif; fill: #1e3a8a; }
      .errorLabel { font: 700 15px Arial, sans-serif; fill: #7f1d1d; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1450" height="1050" fill="#ffffff" />
  <text x="40" y="50" class="title">Spring Boot Backend Flow</text>
  <text x="40" y="78" class="subtitle">How the Java Spring Boot API handles routing, validation, service logic, AWS SDK configuration, and DynamoDB writes.</text>

  <rect x="40" y="120" width="410" height="300" class="group" />
  <text x="65" y="152" class="groupTitle">Application Startup</text>
  <rect x="95" y="185" width="300" height="55" class="config" />
  <text x="245" y="209" text-anchor="middle" class="configLabel">BackendSpringApplication.main()</text>
  <text x="245" y="229" text-anchor="middle" class="small">SpringApplication.run(...)</text>
  <rect x="95" y="275" width="300" height="55" class="config" />
  <text x="245" y="299" text-anchor="middle" class="configLabel">Component scanning</text>
  <text x="245" y="319" text-anchor="middle" class="small">controllers, services, repos, config</text>
  <rect x="95" y="365" width="300" height="55" class="config" />
  <text x="245" y="389" text-anchor="middle" class="configLabel">Embedded server</text>
  <text x="245" y="409" text-anchor="middle" class="small">port 8080</text>
  <path d="M245 240 L245 275" class="line" />
  <path d="M245 330 L245 365" class="line" />

  <rect x="510" y="120" width="900" height="300" class="group" />
  <text x="535" y="152" class="groupTitle">HTTP Request Flow</text>
  <rect x="550" y="185" width="170" height="55" class="box" />
  <text x="635" y="209" text-anchor="middle" class="label">Client</text>
  <text x="635" y="229" text-anchor="middle" class="small">Angular / Postman</text>
  <rect x="760" y="185" width="210" height="55" class="box" />
  <text x="865" y="209" text-anchor="middle" class="label">POST /api/v1/register</text>
  <text x="865" y="229" text-anchor="middle" class="small">Spring route</text>
  <rect x="1010" y="185" width="190" height="55" class="box" />
  <text x="1105" y="209" text-anchor="middle" class="label">ApiController</text>
  <text x="1105" y="229" text-anchor="middle" class="small">@PostMapping</text>
  <rect x="1240" y="185" width="140" height="55" class="box" />
  <text x="1310" y="209" text-anchor="middle" class="label">@Valid</text>
  <text x="1310" y="229" text-anchor="middle" class="small">DTO rules</text>

  <rect x="760" y="310" width="250" height="55" class="box" />
  <text x="885" y="334" text-anchor="middle" class="label">RegisterService.createUser</text>
  <text x="885" y="354" text-anchor="middle" class="small">business logic</text>
  <rect x="1060" y="310" width="250" height="55" class="box" />
  <text x="1185" y="334" text-anchor="middle" class="label">RegisterResponse</text>
  <text x="1185" y="354" text-anchor="middle" class="small">message + id</text>

  <path d="M720 212 L760 212" class="line" />
  <path d="M970 212 L1010 212" class="line" />
  <path d="M1200 212 L1240 212" class="line" />
  <path d="M1310 240 C1310 295 1010 285 930 310" class="line" />
  <path d="M1010 338 L1060 338" class="line" />

  <rect x="40" y="485" width="430" height="360" class="group" />
  <text x="65" y="517" class="groupTitle">Validation and Error Handling</text>
  <rect x="95" y="555" width="320" height="55" class="box" />
  <text x="255" y="579" text-anchor="middle" class="label">RegisterRequest DTO</text>
  <text x="255" y="599" text-anchor="middle" class="small">JSON mapped by Jackson</text>
  <rect x="95" y="640" width="320" height="55" class="box" />
  <text x="255" y="664" text-anchor="middle" class="label">Validation annotations</text>
  <text x="255" y="684" text-anchor="middle" class="small">@NotBlank, @Email, @Size(min=8)</text>
  <rect x="95" y="725" width="320" height="55" class="error" />
  <text x="255" y="749" text-anchor="middle" class="errorLabel">GlobalExceptionHandler</text>
  <text x="255" y="769" text-anchor="middle" class="small">400 validation / 500 generic</text>
  <path d="M255 610 L255 640" class="line" />
  <path d="M255 695 L255 725" class="line" />

  <rect x="520" y="485" width="430" height="360" class="group" />
  <text x="545" y="517" class="groupTitle">Service Layer</text>
  <rect x="575" y="555" width="320" height="55" class="box" />
  <text x="735" y="579" text-anchor="middle" class="label">UUID.randomUUID()</text>
  <text x="735" y="599" text-anchor="middle" class="small">new user id</text>
  <rect x="575" y="640" width="320" height="55" class="box" />
  <text x="735" y="664" text-anchor="middle" class="label">BCryptPasswordEncoder</text>
  <text x="735" y="684" text-anchor="middle" class="small">hash password, 10 rounds</text>
  <rect x="575" y="725" width="320" height="55" class="box" />
  <text x="735" y="749" text-anchor="middle" class="label">Build user item map</text>
  <text x="735" y="769" text-anchor="middle" class="small">role, is_active, created_at</text>
  <path d="M735 610 L735 640" class="line" />
  <path d="M735 695 L735 725" class="line" />

  <rect x="1000" y="485" width="410" height="360" class="group" />
  <text x="1025" y="517" class="groupTitle">Repository and DynamoDB</text>
  <rect x="1055" y="555" width="300" height="55" class="box" />
  <text x="1205" y="579" text-anchor="middle" class="label">UserRepository</text>
  <text x="1205" y="599" text-anchor="middle" class="small">interface contract</text>
  <rect x="1055" y="640" width="300" height="55" class="box" />
  <text x="1205" y="664" text-anchor="middle" class="label">DynamoDbUserRepository</text>
  <text x="1205" y="684" text-anchor="middle" class="small">converts to AttributeValue</text>
  <rect x="1055" y="725" width="300" height="55" class="box" />
  <text x="1205" y="749" text-anchor="middle" class="label">DynamoDB users table</text>
  <text x="1205" y="769" text-anchor="middle" class="small">PutItemRequest</text>
  <path d="M1205 610 L1205 640" class="line" />
  <path d="M1205 695 L1205 725" class="line" />

  <path d="M885 365 C885 430 735 470 735 555" class="line" />
  <path d="M895 752 L1055 582" class="line" />

  <rect x="40" y="895" width="1370" height="100" class="config" />
  <text x="725" y="925" text-anchor="middle" class="configLabel">Configuration: application.properties</text>
  <text x="725" y="950" text-anchor="middle" class="small">server.port=8080, app.users-table=users, app.aws-region=us-east-1</text>
  <text x="725" y="975" text-anchor="middle" class="small">AwsConfig creates DynamoDbClient; DynamoDbUserRepository receives table name and client through Spring dependency injection.</text>
</svg>
