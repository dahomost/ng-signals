<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 16px Arial, sans-serif; fill: #475569; }
      .box { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .future { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .label { font: 600 15px Arial, sans-serif; fill: #14532d; }
      .future-label { font: 600 15px Arial, sans-serif; fill: #7f1d1d; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .future-line { stroke: #dc2626; stroke-width: 2.2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow-red); }
      .group-title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .group { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 6; rx: 16; }
    </style>
  </defs>

  <rect width="1200" height="820" fill="#ffffff" />
